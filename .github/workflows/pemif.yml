name: PEMIF v20 Signal Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests websocket-client python-dotenv

      - name: Run PEMIF
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHATID: ${{ secrets.TELEGRAM_CHATID }}
          TWELVEDATA_KEY: ${{ secrets.TWELVEDATA_KEY }}
          SYMBOL: XAU/USD
          INTERVAL: 5min
        run: python main.py
